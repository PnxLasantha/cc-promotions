name: Scrape offers

on:
  schedule:
    - cron: '0 0,12 * * *'   # midnight + noon UTC
  push:
    branches: [master]
  workflow_dispatch:           # allow manual trigger from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Unit tests need no browser — run before the (slow) Playwright install.
      - name: Unit tests
        run: npm test

      - run: npx playwright install chromium --with-deps

      # Scrape may exit 1 when a source failed/floored (data still written +
      # carried forward). Let the job continue so the commit still happens.
      - name: Scrape
        id: scrape
        continue-on-error: true
        run: node scrape.js

      # Bad data must not ship — this blocks the commit if it fails.
      - name: Validate generated offers
        run: npm run validate

      - name: Commit updated offers
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add offers.json
          git diff --cached --quiet || git commit -m "chore: refresh offers [skip ci]"
          git push

      # Make the run red (and fire notifications) AFTER the commit is pushed.
      - name: Fail if scrape failed
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "Scrape reported failure/floor — see logs and sourceStatus in offers.json."
          exit 1
